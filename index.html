<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script defer src="./bundle.js"></script>
    <link rel="stylesheet" href="./global.css" />
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <title>Leetcode Progress Watcher</title>

    <style>
        /* ********** Side-by-Side Layout (Matching Height) ********** */
        .dashboard-container {
            display: flex;
            flex-direction: row;
            gap: 10px;
            padding: 10px;
            /* Yeh line ensure karegi ki Graph aur Table ki height humesha barabar rahe */
            align-items: stretch; 
        }

        #counts_table {
            flex: 1;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        #trends_graph {
            flex: 2.5; /* Graph ko thoda wide rakha hai taaki clear dikhe */
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            /* Height auto matlab jitna bada table, utna bada graph */
            height: auto; 
            min-height: 500px; /* Kam se kam itna bada toh rahega hi */
        }

        .preferences {
            display: flex;
            gap: 15px;
            justify-content: center;
            padding: 15px;
            background: #f3f4f6;
            border-bottom: 1px solid #ddd;
        }

        #custom_footer {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="preferences">
        <input
            placeholder="Show progress in past n days"
            type="number"
            id="days_count"
            min=1
        />
        <select id="difficulty_level">
            <option value="All">All</option>
            <option value="Easy">Easy</option>
            <option value="Medium">Medium</option>
            <option value="Hard">Hard</option>
        </select>
    </div>

    <div class="dashboard-container">
        <div id="counts_table"></div>
        <div id="trends_graph"></div>
    </div>

    <div id="custom_footer">
        <strong>Developed by Ayaj Khan</strong>
    </div>

<script>
  // ********** Student Name Mapping **********
  const studentMapping = {
    "Abhishek_231": "Abhishek Singh",
    "AbhyanshPathak": "Abhyansh Pathak",
    "adarshpandit123": "Adarsh Pandit",
    "amithawa4u": "Amit Hawa",
    "Aditya_pandey827": "Aditya Pandey",
    "lyshalisha": "Alisha",
    "Amansinghyadav1234": "Aman Singh Yadav",
    "Anuragjuyal": "Anurag Juyal",
    "aparnasingh25": "Aparna Singh",
    "arunyadav708090": "Arun Yadav",
    "Aryan-0coder": "Aryan",
    "Ashtha_Singh": "Astha Singh",
    "ashp18": "Ashp",
    "AyajKhan_": "Ayaj Khan",
    "sunny1236": "Sunny",
    "Bhawana_Bora": "Bhawana Bora",
    "Bhumi_Srivastava10": "Bhumi Srivastava",
    "farman_code_": "Farman",
    "Ishank_Yadav": "Ishank Yadav",
    "jatin3106": "Jatin",
    "kritii06": "Kriti",
    "Sharma_Manya20": "Manya Sharma",
    "MohdTahirKhan": "Mohd Tahir Khan",
    "Naresh_Purohit": "Naresh Purohit",
    "00AMUL0g0q": "Amul Kumar",
    "preeti_singh129": "Preeti Singh",
    "rishavkumar-096": "Rishav Kumar",
    "rishu07wani": "Rishu Wani",
    "riteshh_prajapati": "Ritesh Prajapati",
    "saurabhyadav53": "Saurabh Yadav",
    "Shams_19": "Shams",
    "shiv_anshkushwaha": "Shivansh Kushwaha",
    "Surajchauhan08": "Suraj Chauhan",
    "Sonu_Chauhan_18": "Sonu Chauhan"
  };

  function fixTable() {
    const table = document.querySelector('table');
    if (!table) return;

    const headerRow = table.querySelector('thead tr');
    if (headerRow && !headerRow.getAttribute('data-fixed')) {
      const th = document.createElement('th');
      th.innerText = "Student Name";
      th.className = "p-3 text-left bg-blue-600 text-white font-bold";
      headerRow.insertBefore(th, headerRow.firstChild);
      headerRow.setAttribute('data-fixed', 'true');
    }

    const rows = table.querySelectorAll('tbody tr');
    rows.forEach(row => {
      if (row.cells.length > 0 && !row.getAttribute('data-named')) {
        let username = "";
        Array.from(row.cells).forEach(cell => {
           const text = cell.innerText.replace('@', '').trim();
           if (studentMapping[text]) {
             username = text;
           }
        });
        const realName = studentMapping[username] || "Student";
        const nameTd = document.createElement('td');
        nameTd.innerText = realName;
        nameTd.className = "p-3 font-bold text-gray-800 border-b";
        row.insertBefore(nameTd, row.firstChild);
        row.setAttribute('data-named', 'true');
      }
    });
  }
  setInterval(fixTable, 1000);
</script>
</body>
</html>
